<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>基本エイム - ECMAP</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    h1 { color: #3fb950; }
    p  { color: #8b949e; }
    button {
      padding: 12px 32px;
      background: #3fb950;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

  <a class="back-btn" href="index.html">← ホームへ戻る</a>

  <!-- Firebase SDK -->
